name: "FRP Client"
description: "You can use this tool to achieve remote access to local Home Assistant OS by port forwarding"
version: "1.2.1"
slug: "frp_client"
host_network: true
startup: application
boot: "auto"
init: false
map:
  - "share:rw"
privileged:
  - NET_ADMIN
devices:
  - /dev/net/tun
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  serverAddr: "example.com"
  serverPort: 7000
  authToken: "123456789"
  httpProxyName: "homeassistantHttp"
  httpLocalPort: 80
  httpRemotePort: 80
  httpsProxyName: "homeassistantHttps"
  httpsLocalPort: 443
  httpsRemotePort: 443  
schema:
  serverAddr: str
  serverPort: int
  authToken: str
  httpProxyName: str
  httpLocalPort: int
  httpRemotePort: int
  httpsProxyName: str
  httpsLocalPort: int
  httpsRemotePort: int
